name: Publicador Automático de Noticias

on:
  schedule:
    - cron: '0 */4 * * *'  # Ejecución automática cada 4 horas
  workflow_dispatch:      # Permite ejecución manual desde la pestaña Actions de GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'scripts/python/requirements.txt'

      - name: Install Python dependencies
        run: |
          pip install -r scripts/python/requirements.txt

      - name: Configure Environment Variables
        run: |
          cat <<EOF > .env
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          GEMINI_API_KEY_2="${{ secrets.GEMINI_API_KEY_2 }}"
          GEMINI_API_KEY_3="${{ secrets.GEMINI_API_KEY_3 }}"
          HF_TOKEN="${{ secrets.HF_TOKEN }}"
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          TELEGRAM_CHANNEL_ID="${{ secrets.TELEGRAM_CHANNEL_ID }}"
          BLUESKY_HANDLE="${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_PASSWORD="${{ secrets.BLUESKY_PASSWORD }}"
          BINANCE_SQUARE_API_KEY="${{ secrets.BINANCE_SQUARE_API_KEY }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
          EOF

      - name: Run Database Migrations
        run: npx prisma db push

      - name: Run Publish Pipeline
        run: |
          chmod +x publicar.sh
          ./publicar.sh
