version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: emedoteme
      POSTGRES_PASSWORD: emedoteme
      POSTGRES_DB: emedoteme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  flux-api:
    build:
      context: ./flux-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  pgdata:
